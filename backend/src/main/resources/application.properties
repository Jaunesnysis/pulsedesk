# ── Application ──────────────────────────────────────────────
spring.application.name=pulsedesk
server.port=8080

# ── H2 In-Memory Database ─────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:pulsedeskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Hugging Face ──────────────────────────────────────────────
# Replace with your real token (hf_...)
huggingface.api.token=${HF_TOKEN}
huggingface.api.model=mistralai/Mistral-7B-Instruct-v0.2:featherless-ai
huggingface.api.url=https://router.huggingface.co/v1/chat/completions
huggingface.api.timeout=30000